<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GST 102 – Exam Practice (60 Questions)</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #111827;
    --ink: #e5e7eb;
    --muted: #94a3b8;
    --accent: #7c3aed;
    --accent-2: #22c55e;
    --wrong: #ef4444;
    --right: #22c55e;
    --chip: #1f2937;
  }
  html, body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji"; background: var(--bg); color: var(--ink);}
  .wrap { max-width: 920px; margin: 0 auto; padding: 24px; }
  header { display:flex; gap:16px; align-items:flex-start; flex-wrap: wrap; }
  header h1 { margin:0; font-size: 1.6rem; line-height:1.2; }
  header .meta { color: var(--muted); font-size: .95rem; }
  .controls { display:flex; gap:8px; flex-wrap: wrap; margin-top: 8px; }
  button, select { background: var(--chip); color: var(--ink); border: 1px solid #334155; padding: 10px 14px; border-radius: 10px; cursor: pointer; }
  button:hover { border-color: var(--accent); }
  .grid { display:grid; grid-template-columns: 1fr; gap:16px; margin-top: 18px; }
  @media (min-width: 760px){ .grid { grid-template-columns: 1fr 1fr; } }
  .card { background: var(--card); border: 1px solid #1f2937; border-radius: 16px; padding: 16px; }
  .qhead { display:flex; justify-content: space-between; align-items: center; gap: 8px; }
  .qnum { font-weight: 700; color: var(--muted); }
  .qtxt { margin: 8px 0 10px; font-size: 1rem; }
  .opts { display:flex; flex-direction: column; gap: 8px; }
  .opt { display:flex; gap:10px; align-items: flex-start; background:#0b1220; border:1px solid #1f2937; border-radius: 12px; padding: 10px; cursor:pointer; }
  .opt input { margin-top: 3px; }
  .opt.correct { border-color: var(--right); }
  .opt.wrong { border-color: var(--wrong); }
  .explain { margin-top: 8px; color: var(--muted); font-size: .95rem; display:none; }
  .chip { background: var(--chip); color: var(--muted); padding: 4px 8px; border-radius: 999px; font-size: .8rem; }
  .foot { margin-top: 18px; display:flex; justify-content: space-between; align-items:center; flex-wrap: wrap; gap: 8px; }
  .score { font-weight:700; }
  .hidden { display:none; }
  .search { margin-top:12px; display:flex; gap:8px; }
  .search input { flex:1; background:#0b1220; color: var(--ink); border:1px solid #334155; border-radius:10px; padding:10px 12px; }
  .legend { display:flex; gap:10px; align-items:center; color: var(--muted); font-size:.9rem; }
  .legend .tag { width:10px; height:10px; border-radius:3px; display:inline-block; }
  .tag-right { background: var(--right); }
  .tag-wrong { background: var(--wrong); }
  .pill { background:#172554; padding:3px 8px; border-radius:999px; font-size:.8rem; color:#c7d2fe; border:1px solid #1e3a8a; }
  .subject { margin-left:auto; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
  a { color: #a78bfa; text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>GST 102 – Exam Practice (60 Questions)</h1>
      <div class="meta"> Prepared by MAVERICK </div>
      <div class="controls">
        <button id="start">Start quiz</button>
        <button id="shuffle">Shuffle</button>
        <button id="reset">Reset</button>
        <select id="mode">
          <option value="practice">Practice mode (show feedback per question)</option>
          <option value="exam">Exam mode (feedback at the end)</option>
        </select>
        <select id="filter">
          <option value="all">All topics</option>
          <option value="morphology">Morphology & word formation</option>
          <option value="outlining">Outlining</option>
          <option value="brainstorming">Brainstorming</option>
          <option value="email">Email etiquette</option>
          <option value="interference">Language interference & code-mixing</option>
          <option value="literature">Literature</option>
        </select>
      </div>
      <div class="search">
        <input id="search" type="search" placeholder="Search questions or options..." />
        <span class="pill mono" id="timer">00:00</span>
        <span class="pill" id="progress">0 / 60</span>
      </div>
    </div>
  </header>

  <div class="legend" style="margin-top:10px;">
    <span><span class="tag tag-right"></span> correct</span>
    <span><span class="tag tag-wrong"></span> wrong</span>
  </div>

  <main class="grid" id="quiz"></main>

  <footer class="foot">
    <div class="score" id="score">Score: —</div>
    <div class="subject">Share: <span class="mono">GST 102 quiz (by Maverick) </span></div>
  </footer>
</div>

let order = [...DATA.keys()];
let answered = new Map();
let started = false;
let examMode = false;
let timerId = null, startMs = null;

const el = (sel) => document.querySelector(sel);
const quiz = el('#quiz');

function fmtTime(ms){
  const s = Math.floor(ms/1000);
  const mm = String(Math.floor(s/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  return `${mm}:${ss}`;
}

function startTimer(){
  if (timerId) return;
  startMs = Date.now();
  timerId = setInterval(()=>{
    el('#timer').textContent = fmtTime(Date.now() - startMs);
  }, 200);
}

function stopTimer(){
  clearInterval(timerId);
  timerId = null;
}

function shuffle(){
  for (let i = order.length -1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [order[i], order[j]] = [order[j], order[i]];
  }
}

function render(){
  quiz.innerHTML = '';
  const term = el('#search').value.trim().toLowerCase();
  const filter = el('#filter').value;
  let shown = 0;

  for (const idx of order){
    const d = DATA[idx];
    if (filter !== 'all' && d.t !== filter) continue;

    if (term){
      const hay = (d.q + ' ' + d.a.join(' ')).toLowerCase();
      if (!hay.includes(term)) continue;
    }

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = idx;

    const h = document.createElement('div');
    h.className = 'qhead';
    h.innerHTML = `<div class="qnum">Q${d.n}</div><span class="chip">${labelTopic(d.t)}</span>`;
    card.appendChild(h);

    const qt = document.createElement('div');
    qt.className = 'qtxt';
    qt.textContent = d.q;
    card.appendChild(qt);

    const opts = document.createElement('div');
    opts.className = 'opts';

    d.a.forEach((txt, i) => {
      const opt = document.createElement('label');
      opt.className = 'opt';
      opt.innerHTML = `<input type="radio" name="q-${idx}" value="${i}" /> <div>${"ABCD".charAt(i)}. ${txt}</div>`;
      opt.addEventListener('click', (e)=>{
        // allow label click without double-firing
        if (e.target.tagName !== 'INPUT') {
          opt.querySelector('input').checked = true;
        }
        onAnswer(idx, i, opt, card);
      });
      opts.appendChild(opt);
    });

    card.appendChild(opts);

    const why = document.createElement('div');
    why.className = 'explain';
    why.textContent = WHY[d.n] || '';
    card.appendChild(why);

    quiz.appendChild(card);
    shown++;
  }

  el('#progress').textContent = `${answered.size} / ${DATA.length}`;
  updateScore();
  if (shown === 0) {
    const empty = document.createElement('div');
    empty.className = 'card';
    empty.textContent = 'No questions match your search/filter.';
    quiz.appendChild(empty);
  }
}

function labelTopic(t){
  switch(t){
    case 'morphology': return 'Morphology';
    case 'outlining': return 'Outlining';
    case 'brainstorming': return 'Brainstorming';
    case 'email': return 'Email etiquette';
    case 'interference': return 'Interference & Code-mixing';
    case 'literature': return 'Literature';
    default: return 'General';
  }
}

function onAnswer(idx, choice, optEl, cardEl){
  if (!started) start();
  const d = DATA[idx];
  const prev = answered.get(idx);
  const correct = (choice === d.c);

  // mark selected
  const allOpts = cardEl.querySelectorAll('.opt');
  allOpts.forEach(o => o.classList.remove('correct','wrong'));

  if (examMode){
    // store but don’t show correctness yet
    answered.set(idx, {choice, correct});
  } else {
    // immediate feedback
    if (correct) {
      optEl.classList.add('correct');
    } else {
      optEl.classList.add('wrong');
      // also highlight the correct one
      const rightOpt = allOpts[d.c];
      rightOpt.classList.add('correct');
    }
    answered.set(idx, {choice, correct});
    const why = cardEl.querySelector('.explain');
    if (why && WHY[d.n]) why.style.display = 'block';
  }

  el('#progress').textContent = `${answered.size} / ${DATA.length}`;
  updateScore();

  // if all answered in exam mode, reveal
  if (examMode && answered.size === DATA.length){
    revealAll();
    stopTimer();
  }
}

function updateScore(){
  let got = 0;
  answered.forEach(v => { if (v.correct) got++; });
  if (answered.size === 0){
    el('#score').textContent = 'Score: —';
  } else {
    const pct = Math.round(100 * got / DATA.length);
    el('#score').textContent = `Score: ${got}/${DATA.length} (${pct}%)`;
  }
}

function revealAll(){
  document.querySelectorAll('.card').forEach(card=>{
    const idx = Number(card.dataset.index);
    const d = DATA[idx];
    const state = answered.get(idx);
    if (!state) return;
    const all = card.querySelectorAll('.opt');
    all.forEach((o,i)=>{
      o.classList.remove('correct','wrong');
      if (i === d.c) o.classList.add('correct');
      if (state.choice === i && i !== d.c) o.classList.add('wrong');
    });
    const why = card.querySelector('.explain');
    if (why && WHY[d.n]) why.style.display = 'block';
  });
}

function start(){
  started = true;
  startTimer();
}

function hardReset(){
  answered.clear();
  started = false;
  stopTimer();
  el('#timer').textContent = '00:00';
  render();
}

el('#start').addEventListener('click', ()=>{
  if (!started) start();
});

el('#shuffle').addEventListener('click', ()=>{
  shuffle();
  render();
});

el('#reset').addEventListener('click', ()=>{
  hardReset();
});

el('#mode').addEventListener('change', (e)=>{
  examMode = (e.target.value === 'exam');
  hardReset();
});

el('#filter').addEventListener('change', ()=>{
  render();
});

el('#search').addEventListener('input', ()=>{
  render();
});

// initial
render();
</script>
</body>
</html>
